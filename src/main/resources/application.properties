spring.application.name=product-indexer
server.port=8085
# Elasticsearch - same as search service
spring.elasticsearch.uris=http://localhost:9200

# Pub/Sub - GKE indexer pulls from subscription
product-indexer.pubsub.enabled=true
product-indexer.pubsub.subscription=product-events-sub
spring.cloud.gcp.firestore.enabled=true
spring.cloud.gcp.project-id=my-project-chat-ai-487408
spring.cloud.gcp.credentials.location=file:/home/shivam-sharma/.gcp/my-project-chat-ai-487408-5604b2cd4107.json
spring.data.elasticsearch.auto-index-creation=true
# Disable Elasticsearch repository scanning (we use ElasticsearchOperations directly; Firestore repo was being picked up)
spring.data.elasticsearch.repositories.enabled=false