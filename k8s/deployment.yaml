# Template: replace placeholders before apply, or use envsubst / sed in CI.
# Image is updated by Cloud Build (kubectl set image); initial image uses <ARTIFACT_REGISTRY_URL>/<SERVICE_NAME>:<IMAGE_TAG>.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: <SERVICE_NAME>
  labels:
    app.kubernetes.io/name: <SERVICE_NAME>
    app.kubernetes.io/version: "<APP_VERSION>"
  # For Workload Identity (Firestore, Pub/Sub), annotate after creation, e.g.:
  # annotations:
  #   iam.gke.io/gcp-service-account: <K8S_WORKLOAD_SA>@<PROJECT_ID>.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <SERVICE_NAME>
  labels:
    app.kubernetes.io/name: <SERVICE_NAME>
    app.kubernetes.io/version: "<APP_VERSION>"
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: <SERVICE_NAME>
  template:
    metadata:
      labels:
        app.kubernetes.io/name: <SERVICE_NAME>
        app.kubernetes.io/version: "<APP_VERSION>"
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: <SERVICE_NAME>
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: <SERVICE_NAME>
      containers:
        - name: <SERVICE_NAME>
          image: <ARTIFACT_REGISTRY_URL>/<SERVICE_NAME>:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            # Override or extend via ConfigMap / Secret (see envFrom).
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
          envFrom:
            - configMapRef:
                name: <SERVICE_NAME>-env
                optional: true
            - secretRef:
                name: <SERVICE_NAME>-secrets
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
